<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Listado de mis tareas</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        'primary-hover': '#4f46e5',
                        success: '#22c55e',
                        danger: '#ef4444',
                        warning: '#f59e0b'
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200">

    <!-- Título -->
    <header class="bg-primary text-white py-6 px-8 flex justify-between items-center shadow-md relative">
        <button id="theme-toggle" class="px-4 py-2 bg-white/20 hover:bg-white/30 rounded-lg cursor-pointer transition-colors text-sm absolute left-8 z-10">
            🌙 Modo oscuro
        </button>

        <div class="text-center flex-1">
            <h1 class="text-3xl font-bold mb-1">TaskFlow</h1>
            <p class="text-sm opacity-90"><em>Listado de mis tareas</em></p>
        </div>

        <div class="absolute right-8 w-20"></div>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-6xl mx-auto p-6 flex flex-col gap-6">
        
        <!-- 1. Lista de Tareas -->
        <section class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 dark:text-gray-100">Mis tareas</h2>
            
            <div class="flex flex-col gap-6 mb-6 p-4 bg-gray-50 dark:bg-gray-700 rounded-lg">
                <div class="w-full">
                    <input type="text" 
                           id="search-input" 
                           placeholder="🔍 Buscar mis tareas..." 
                           class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-lg text-base focus:outline-none focus:border-primary dark:bg-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 transition-colors">
                </div>
                
                <!-- Filtros y Acciones -->
                <div class="flex gap-4 flex-wrap justify-center items-center">
                    <button class="filter-btn px-4 py-2 border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-full text-sm cursor-pointer transition-all hover:border-primary hover:text-primary dark:hover:text-primary text-gray-800 dark:text-gray-100" data-filter="pending">Pendientes</button>
                    <button class="filter-btn px-4 py-2 border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-full text-sm cursor-pointer transition-all hover:border-primary hover:text-primary dark:hover:text-primary text-gray-800 dark:text-gray-100" data-filter="completed">Completadas</button>
                    <button class="filter-btn active px-4 py-2 bg-primary text-white border-none rounded-full text-sm cursor-pointer transition-all hover:bg-primary-hover text-white" data-filter="all">Todas</button>
                    <button id="complete-all-btn" class="filter-btn px-4 py-2 bg-primary text-white border-none rounded-full text-sm cursor-pointer transition-all hover:bg-primary-hover">✓ Marcar todas</button>
                    <button id="delete-completed-btn" class="filter-btn px-4 py-2 bg-danger text-white border-none rounded-full text-sm cursor-pointer transition-all hover:bg-red-700 active">🗑️ Borrar completadas</button>
                </div>
            </div>
            
            <ul id="tasks-container" class="space-y-2">
                <li class="empty-state text-center py-8 text-gray-500 dark:text-gray-400 italic">No hay tareas aún. ¡Añade una!</li>
            </ul>
        </section>

        <!-- 2. Estadísticas-->
        <aside class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm border-l-4 border-primary dark:border-l-0 dark:border-t-4">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 dark:text-gray-100">Estadísticas</h2>
            
            <div class="flex justify-between py-2 border-b border-gray-200 dark:border-gray-700">
                <span class="text-gray-700 dark:text-gray-300">Pendientes:</span>
                <strong id="pending-count" class="text-primary">0</strong>
            </div>
            
            <div class="flex justify-between py-2 border-b border-gray-200 dark:border-gray-700">
                <span class="text-gray-700 dark:text-gray-300">Completadas:</span>
                <strong id="completed-count" class="text-primary">0</strong>
            </div>
            
            <div class="flex justify-between py-2">
                <span class="text-gray-700 dark:text-gray-300">Total:</span>
                <strong id="total-count" class="text-primary">0</strong>
            </div>
        </aside>

        <!-- 3. Formulario -->
        <section class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm">
            <h3 class="text-lg font-semibold mb-4 text-gray-800 dark:text-gray-100">Añade su nueva tarea</h3>
            <form id="task-form" class="flex flex-col gap-4">
                <input type="text" id="task-input" placeholder="Escribe una nueva tarea..." required class="px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-lg text-base focus:outline-none focus:border-primary dark:bg-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 transition-colors">
                <button type="submit" class="px-4 py-3 bg-primary text-white border-none rounded-lg text-base cursor-pointer transition-colors hover:bg-primary-hover">Añadir</button>
                 <select id="priority-select" class="px-4 py-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg text-sm bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 focus:outline-none focus:border-primary">
                        <option value="alta">Ugente 🔴</option>
                        <option value="media">Mediana 🟡</option>
                        <option value="baja">Baja 🟢</option>
                </select>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
