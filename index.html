<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestión de Tareas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Título -->
    <header>
        <h1>TaskFlow</h1>
        <p>Gestión de Tareas</p>
    </header>

    <!-- Contenido -->
    <main>
        <!-- 1. Lista de tareas -->
        <section class="task-list">
            <h2>Mis tareas</h2>
            
            <!-- 🔵 NUEVO: Barra de búsqueda y filtros -->
            <div class="task-controls">
                <!-- Búsqueda -->
                <div class="search-box">
                    <input type="text" 
                           id="search-input" 
                           placeholder="🔍 Buscar tareas..." 
                           class="search-input">
                </div>
                
                <!-- Filtros -->
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Todas</button>
                    <button class="filter-btn" data-filter="pending">Pendientes</button>
                    <button class="filter-btn" data-filter="completed">Completadas</button>
                </div>
                
                <!-- Acciones masivas -->
                <div class="bulk-actions">
                    <button id="complete-all-btn" class="btn-bulk">
                        ✓ Marcar todas
                    </button>
                    <button id="delete-completed-btn" class="btn-bulk btn-danger">
                        🗑️ Borrar completadas
                    </button>
                </div>
            </div>
            
            <!-- Lista de tareas -->
            <ul id="tasks-container">
                <li class="empty-state">No hay tareas aún. ¡Añade una!</li>
            </ul>
        </section>

        <!-- 2. Estadísticas -->
        <aside class="stats-panel">
            <h2>Estadísticas</h2>
            <div class="stat-item">
                <span>Total:</span>
                <strong id="total-count">0</strong>
            </div>
            <div class="stat-item">
                <span>Completadas:</span>
                <strong id="completed-count">0</strong>
            </div>
            <div class="stat-item">
                <span>Pendientes:</span>
                <strong id="pending-count">0</strong>
            </div>
            
            <!-- 🔵 NUEVO: Botones de backup -->
            <hr style="margin: 1rem 0; border: none; border-top: 1px solid var(--color-border);">
            
            <div class="backup-actions">
                <button onclick="exportData()">📥 Exportar</button>
                <button onclick="document.getElementById('import-file').click()">📤 Importar</button>
                <button onclick="clearAllData()" style="background-color: #64748b;">🗑️ Borrar todo</button>
            </div>
            <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(this.files[0])">
        </aside>

        <!-- 3. Formulario para añadir tareas -->
        <section class="task-form">
            <form id="task-form">
                <label for="task-input">Añadir nueva tarea:</label>
                <input type="text" id="task-input" placeholder="Escribe una tarea..." required>
                <button type="submit">Añadir</button>
            </form>
        </section>
    </main>

    <!-- Pie de página -->
    <footer>
        <p>&copy; 2026 TaskFlow</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
