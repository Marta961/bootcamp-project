<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestión de Tareas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Título -->
    <header>
        <h1>TaskFlow <br><em>Gestión de mis tareas</em></h1>
    </header>

    <!-- Contenido principal -->
    <main>
        <!-- 1. Lista de tareas -->
        <section class="task-list">
            <h2>Mis tareas</h2>
            
            <!-- Barra de búsqueda y filtros -->
            <div class="task-controls">
                <!-- Búsqueda -->
                <div class="search-box">
                    <input type="text" 
                           id="search-input" 
                           placeholder="🔍 Buscar mis tareas..." 
                           class="search-input">
                </div>
                
                <!-- Filtros -->
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Todas</button>
                    <button class="filter-btn" data-filter="pending">Pendientes</button>
                    <button class="filter-btn" data-filter="completed">Completadas</button>
                    <button id="complete-all-btn" class="btn-bulk">
                        ✓ Marcar todas
                    </button>
                    <button id="delete-completed-btn" class="btn-bulk btn-danger">
                        🗑️ Borrar completadas
                    </button>
                </div>
            </div>
            
            <!-- Lista de mis tareas -->
            <ul id="tasks-container">
                <li class="empty-state">No tengo tareas aún. ¡Añade una!</li>
            </ul>
        </section>

        <!-- 2. Estadísticas -->
        <aside class="stats-panel">
            <h2>Estadísticas</h2>
            <div class="stat-item">
                <span>Total:</span>
                <strong id="total-count">0</strong>
            </div>
            <div class="stat-item">
                <span>Completadas:</span>
                <strong id="completed-count">0</strong>
            </div>
            <div class="stat-item">
                <span>Pendientes:</span>
                <strong id="pending-count">0</strong>
            </div>
            
            <hr class="separator">
            
            <div class="backup-actions">
                <button onclick="exportData()">📥 Exportar</button>
                <button onclick="document.getElementById('import-file').click()">📤 Importar</button>
                <button onclick="clearAllData()" class="btn-gray">🗑️ Borrar todo</button>
            </div>
            <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(this.files[0])">
        </aside>

        <!-- 3. Formulario -->
        <section class="task-form">
            <h3>Formulario</h3>
            <form id="task-form">
                <input type="text" id="task-input" placeholder="Escribe mejoras o tareas..." required>
                <button type="submit">Añadir</button>
            </form>
        </section>
    </main>

</html>
