<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Base de la API REST (Fase D). En producción (Vercel) usamos ruta relativa /api/v1. -->
    <meta name="taskflow-api-base" content="/api/v1">
    <script>
        // Local: el frontend suele servirse en 5173 y la API en 3000.
        // Producción (Vercel): se mantiene /api/v1 en el mismo origen.
        (function () {
            var h = window.location.hostname;
            if (h === 'localhost' || h === '127.0.0.1') {
                window.TASKFLOW_API_BASE = 'http://localhost:3000/api/v1';
            }
        })();
    </script>
    <title>TaskFlow - Listado de mis tareas</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        'primary-hover': '#4f46e5',
                        success: '#22c55e',
                        danger: '#ef4444',
                        warning: '#f59e0b'
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200">

    <!-- Título -->
    <header class="bg-primary text-white py-2 px-2 sm:py-4 sm:px-6 flex justify-between items-center shadow-md relative">
        <button id="theme-toggle" class="theme-toggle-btn px-4 py-2 bg-white/20 hover:bg-white/30 rounded-lg cursor-pointer transition-colors text-sm absolute right-3 top-1/2 transform -translate-y-1/2 z-10 whitespace-nowrap">
            <span class="desktop-text">🌙 Modo oscuro</span>
            <span class="mobile-icon">🌙</span>
        </button>

    <div class="text-center flex-1 py-1">
        <h1 class="text-xl sm:text-2xl font-bold mb-0">TaskFlow</h1>
        <p class="text-xs sm:text-xs opacity-90 mt-1"><em>Listado de mis tareas</em></p>
    </div>

    <div class="absolute right-8 w-20 hidden"></div>
    </header>

    <!-- Estados de red (Fase D): carga y errores HTTP / red -->
    <div id="network-loading" class="hidden max-w-[95%] mx-auto px-6 pt-2" aria-live="polite" aria-busy="false">
        <div class="flex items-center gap-3 rounded-lg border border-primary/30 bg-indigo-50 dark:bg-indigo-950/40 px-4 py-3 text-sm text-gray-800 dark:text-gray-100">
            <span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-primary border-t-transparent" aria-hidden="true"></span>
            <span>Sincronizando con el servidor…</span>
        </div>
    </div>
    <div id="network-error" class="hidden max-w-[95%] mx-auto px-6 pt-2" role="alert" aria-live="assertive">
        <div class="flex flex-col gap-2 rounded-lg border border-red-300 bg-red-50 dark:bg-red-950/40 dark:border-red-800 px-4 py-3 text-sm text-red-900 dark:text-red-100">
            <p id="network-error-text" class="font-medium"></p>
            <button type="button" id="network-error-dismiss" class="self-end rounded bg-red-600 px-3 py-1 text-white hover:bg-red-700 text-xs">Cerrar</button>
        </div>
    </div>

    <!-- Contenido Principal -->
    <main class="max-w-[95%] mx-auto p-6 flex flex-col gap-4">
        <!-- 1. Añadir Tarea -->
        <section class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm">
            <h3 class="text-lg font-semibold mb-4 text-gray-800 dark:text-gray-100">Añade su nueva tarea</h3>
            <form id="task-form" class="flex flex-col gap-4">
                <label for="task-input" class="sr-only">Escribe una nueva tarea</label>
                <input type="text" id="task-input" placeholder="Escribe una nueva tarea..." required class="px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-lg text-base focus:outline-none focus:border-primary dark:bg-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 transition-colors">
                
                <label for="priority-select" class="sr-only">Selecciona la prioridad de la tarea</label>
                <select id="priority-select" class="px-4 py-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg text-sm bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 focus:outline-none focus:border-primary">
                    <option value="alta">🔴¡Urgente!</option>
                    <option value="media">🟡Mediana</option>
                    <option value="baja">🟢Baja</option>
                </select>
                
                <button type="submit" class="px-4 py-3 bg-primary text-white border-none rounded-lg text-base cursor-pointer transition-colors hover:bg-primary-hover">Añadir</button>
            </form>
        </section>

        <!-- 2. Lista de Tareas -->
        <section class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 dark:text-gray-100">Mis tareas</h2>
            
            <div class="flex flex-col gap-6 mb-6 p-4 bg-gray-50 dark:bg-gray-700 rounded-lg">
                <div class="w-full">
                    <label for="search-input" class="sr-only">Buscar tareas</label>
                    <input type="text" 
                           id="search-input" 
                           placeholder="🔍 Buscar mis tareas..." 
                           class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-lg text-base focus:outline-none focus:border-primary dark:bg-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 transition-colors">
                </div>
                
                <div class="flex gap-4 flex-wrap justify-center items-center" role="tablist" aria-label="Filtrar tareas">
                    <button class="filter-btn px-4 py-2 border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-full text-sm cursor-pointer transition-all hover:border-primary hover:text-primary dark:hover:text-primary text-gray-800 dark:text-gray-100" data-filter="pending" role="tab" aria-selected="false" tabindex="-1">Pendientes</button>
                    <button class="filter-btn px-4 py-2 border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-full text-sm cursor-pointer transition-all hover:border-primary hover:text-primary dark:hover:text-primary text-gray-800 dark:text-gray-100" data-filter="completed" role="tab" aria-selected="false" tabindex="-1">Completadas</button>
                    <button class="filter-btn active px-4 py-2 bg-primary text-white border-none rounded-full text-sm cursor-pointer transition-all hover:bg-primary-hover text-white" data-filter="all" role="tab" aria-selected="true" tabindex="0">Todas</button>
                    <button id="complete-all-btn" type="button" class="filter-btn px-4 py-2 bg-primary text-white border-none rounded-full text-sm cursor-pointer transition-all hover:bg-primary-hover">✓ Marcar todas</button>
                    <button id="delete-completed-btn" type="button" class="filter-btn px-4 py-2 bg-danger text-white border-none rounded-full text-sm cursor-pointer transition-all hover:bg-red-700 active">🗑️ Borrar completadas</button>
                </div>
            </div>
            
            <ul id="tasks-container" class="space-y-2" role="region" aria-label="Listado de tareas" aria-live="polite" aria-relevant="additions text">
                <li class="empty-state text-center py-8 text-gray-500 dark:text-gray-400 italic">No hay tareas aún. ¡Añade una!</li>
            </ul>
        </section>

        <!-- 3. Estadísticas -->
        <aside class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 dark:text-gray-100">Estadísticas</h2>
            
            <div class="flex justify-between py-2 border-b border-gray-200 dark:border-gray-700" role="status" aria-live="polite">
                <span class="text-gray-700 dark:text-gray-300">Pendientes:</span>
                <strong id="pending-count" class="text-primary">0</strong>
            </div>
            
            <div class="flex justify-between py-2 border-b border-gray-200 dark:border-gray-700" role="status" aria-live="polite">
                <span class="text-gray-700 dark:text-gray-300">Completadas:</span>
                <strong id="completed-count" class="text-primary">0</strong>
            </div>
            
            <div class="flex justify-between py-2">
                <span class="text-gray-700 dark:text-gray-300">Total:</span>
                <strong id="total-count" class="text-primary">0</strong>
            </div>
        </aside>
    </main>

    <!-- Pie de página -->
    <footer class="bg-gray-100 dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-6 mt-8">
        <div class="max-w-[95%] mx-auto px-6 text-center">
            <p class="text-gray-600 dark:text-gray-400 text-sm">
                &copy; 2026 TaskFlow - Listado de tareas
            </p>
            <p class="text-gray-500 dark:text-gray-500 text-xs mt-2">
                Hecho con ❤️ por Marta Grau Garriga
            </p>
        </div>
    </footer>

    <!-- Orden obligatorio: cliente API primero, luego la app (no usar type="module" si abres por file://). -->
    <script src="src/api/client.js"></script>
    <script src="app.js"></script>
</body>
</html>
